<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XENON // Streetwear Store</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Root Variables & Reset --- */
        :root {
            --bg-black: #0a0a0a;
            --card-black: #121212;
            --text-white: #ffffff;
            --silver: #b3b3b3;
            --chrome-silver: #e5e5e5;
            --border-color: #262626;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-black);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text-white);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-link {
            color: var(--silver);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-white);
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .cart-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 1.3rem;
            cursor: pointer;
            position: relative;
        }

        #cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--text-white);
            color: var(--bg-black);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-toggle .bar {
            width: 25px;
            height: 2px;
            background-color: var(--text-white);
            transition: 0.3s ease;
        }

        /* --- Hero Section --- */
        .hero-section {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1509281373149-e957c6296406?q=80&w=1920') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 1rem;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 1rem;
            color: var(--text-white);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--silver);
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .btn-primary {
            display: inline-block;
            padding: 1rem 2.5rem;
            border: 1px solid var(--text-white);
            color: var(--text-white);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-primary:hover {
            background-color: var(--text-white);
            color: var(--bg-black);
        }

        /* --- Products Section --- */
        .products-section {
            max-width: 1300px;
            margin: 6rem auto;
            padding: 0 2rem;
        }

        .section-title {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 3rem;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background-color: var(--card-black);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--silver);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 Streetwear Aspect Ratio Look */
            overflow: hidden;
            background-color: #1a1a1a;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .product-price {
            color: var(--silver);
            font-weight: 500;
        }

        .btn-add-cart {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-white);
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: auto;
            transition: all 0.3s ease;
        }

        .btn-add-cart:hover {
            background-color: var(--text-white);
            color: var(--bg-black);
            border-color: var(--text-white);
        }

        /* --- Cart Drawer System --- */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100%;
            background-color: var(--bg-black);
            border-left: 1px solid var(--border-color);
            z-index: 1002;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.active {
            right: 0;
        }

        .cart-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            letter-spacing: 2px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-white);
            font-size: 2rem;
            cursor: pointer;
        }

        .cart-items-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .cart-item img {
            width: 70px;
            height: 85px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .cart-item-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .cart-item-price {
            color: var(--silver);
            font-size: 0.9rem;
        }

        .cart-item-qty {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--silver);
        }

        .remove-item {
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .cart-footer {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--card-black);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .btn-checkout {
            width: 100%;
            padding: 1rem;
            background-color: var(--text-white);
            color: var(--bg-black);
            border: none;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn-checkout:hover {
            opacity: 0.9;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1001;
            display: none;
        }

        .cart-overlay.active {
            display: block;
        }

        /* --- Contact Section --- */
        .contact-section {
            border-top: 1px solid var(--border-color);
            padding: 6rem 2rem;
            text-align: center;
        }

        .contact-container h2 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 1rem;
        }

        .contact-container p {
            color: var(--silver);
            margin-bottom: 3rem;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .contact-card.whatsapp {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2rem;
            border: 1px solid #25d366;
            color: #25d366;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .contact-card.whatsapp:hover {
            background-color: #25d366;
            color: var(--bg-black);
        }

        .social-icons {
            display: flex;
            gap: 2rem;
            font-size: 1.5rem;
        }

        .social-icons a {
            color: var(--silver);
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: var(--text-white);
        }

        /* --- Footer --- */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        /* --- Mobile Responsive Rules --- */
        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                left: -100%;
                top: 73px;
                flex-direction: column;
                background-color: var(--bg-black);
                width: 100%;
                text-align: center;
                gap: 1.5rem;
                padding: 2rem 0;
                transition: 0.3s ease;
                border-bottom: 1px solid var(--border-color);
            }

            .nav-menu.active {
                left: 0;
            }

            .menu-toggle {
                display: flex;
            }

            .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
            .menu-toggle.active .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .menu-toggle.active .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

            .hero-content h1 {
                font-size: 2.2rem;
            }

            .cart-drawer {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">XENON</a>
            <ul class="nav-menu">
                <li><a href="#hero" class="nav-link">Home</a></li>
                <li><a href="#products" class="nav-link">Shop</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <button id="cart-toggle" class="cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span id="cart-count">0</span>
                </button>
                <div class="menu-toggle" id="mobile-menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </div>
    </nav>

    <header id="hero" class="hero-section">
        <div class="hero-content">
            <h1>RAW. ELEVATED. INDUSTRIAL.</h1>
            <p>Drop 04 // Out Now</p>
            <a href="#products" class="btn-primary">Shop the Collection</a>
        </div>
    </header>

    <main id="products" class="products-section">
        <h2 class="section-title">FEATURED DROPS</h2>
        <div class="product-grid" id="product-grid">
            </div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>YOUR BAG</h3>
            <button id="cart-close" class="close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items-container">
            </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="btn-checkout">PROCEED TO CHECKOUT</button>
        </div>
    </div>
    <div id="cart-overlay" class="cart-overlay"></div>

    <section id="contact" class="contact-section">
        <div class="contact-container">
            <h2>JOIN THE UNDERGROUND</h2>
            <p>Need assistance or custom sizing? Hit us direct.</p>
            <div class="contact-links">
                <a href="https://wa.me/1234567890" target="_blank" class="contact-card whatsapp">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span>WhatsApp Chat</span>
                </a>
                <div class="social-icons">
                    <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 XENON STUDIO. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // --- Expanded Inventory Database (Streetwear Core Lineup) ---
        const products = [
            {
                id: 1,
                name: "OVERSIZED SEAM GRAPHIC HOODIE",
                price: 85.00,
                image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600"
            },
            {
                id: 2,
                name: "BOX FIT OVERSIZED T-SHIRT",
                price: 45.00,
                image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600"
            },
            {
                id: 3,
                name: "XENON CARGO PANTS // SILV",
                price: 110.00,
                image: "https://images.unsplash.com/photo-1517423568366-8b83523034fd?q=80&w=600"
            },
            {
                id: 4,
                name: "DISTRESSED DENIM JACKET",
                price: 140.00,
                image: "https://images.unsplash.com/photo-1576995853123-5a10305d93c0?q=80&w=600"
            },
            {
                id: 5,
                name: "HEAVY KNIT COTTON SWEATER",
                price: 95.00,
                image: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?q=80&w=600"
            },
            {
                id: 6,
                name: "MOTO-NYLON TRACKPANTS",
                price: 75.00,
                image: "https://images.unsplash.com/photo-1551854838-212c50b4c184?q=80&w=600"
            },
            {
                id: 7,
                name: "RAW EDGE LONG SLEEVE TEE",
                price: 55.00,
                image: "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?q=80&w=600"
            },
            {
                id: 8,
                name: "RIBBED INDUSTRIAL BEANIE",
                price: 28.00,
                image: "https://images.unsplash.com/photo-1576871337622-98d48d4aa53e?q=80&w=600"
            },
            {
                id: 9,
                name: "METALLIC LOGO DISTRESSED HAT",
                price: 32.00,
                image: "https://images.unsplash.com/photo-1534215754734-18e55d13ce35?q=80&w=600"
            },
            {
                id: 10,
                name: "COMPRESSION PACK RIB SOCKS",
                price: 18.00,
                image: "https://images.unsplash.com/photo-1582966772680-860e372bb558?q=80&w=600"
            }
        ];

        // --- Persistent Storage State Manager ---
        let cart = JSON.parse(localStorage.getItem('xenon_cart')) || [];

        // --- Cache DOM Elements ---
        const productGrid = document.getElementById('product-grid');
        const cartToggle = document.getElementById('cart-toggle');
        const cartClose = document.getElementById('cart-close');
        const cartDrawer = document.getElementById('cart-drawer');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartTotalPrice = document.getElementById('cart-total-price');
        const cartCount = document.getElementById('cart-count');
        const mobileMenuBtn = document.getElementById('mobile-menu');
        const navMenu = document.querySelector('.nav-menu');

        // --- Core Application Methods ---

        // Display store inventory items dynamically
        function renderProducts() {
            if (!productGrid) return;
            productGrid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image-wrapper">
                        <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <span class="product-price">$${product.price.toFixed(2)}</span>
                        <button class="btn-add-cart" onclick="addToCart(${product.id})">ADD TO BAG</button>
                    </div>
                </div>
            `).join('');
        }

        // Toggle side menu cart interface drawer
        function toggleCart() {
            cartDrawer.classList.toggle('active');
            cartOverlay.classList.toggle('active');
        }

        // Add matching items to global cart structure
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
            // Fluid user interaction: Open drawer natively when an item lands in basket
            cartDrawer.classList.add('active');
            cartOverlay.classList.add('active');
        }

        // Remove designated unique item from layout
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Keep local storage states and totals uniformly synced
        function updateCart() {
            localStorage.setItem('xenon_cart', JSON.stringify(cart));
            renderCartItems();
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartCount.textContent = totalItems;
            cartTotalPrice.textContent = `$${totalPrice.toFixed(2)}`;
        }

        // Write live localized data to DOM target elements
        function renderCartItems() {
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p style="text-align:center; color:#555; margin-top:2rem;">Your bag is empty.</p>`;
                return;
            }

            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-details">
                        <h4 class="cart-item-title">${item.name}</h4>
                        <div class="cart-item-price">$${item.price.toFixed(2)}</div>
                        <div class="cart-item-qty">Qty: ${item.quantity}</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        // Handle structural responsiveness mobile viewport conversions
        function toggleMobileMenu() {
            mobileMenuBtn.classList.toggle('active');
            navMenu.classList.toggle('active');
        }

        // Collapse mobile responsive links directly after click routines
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenuBtn.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // --- Runtime Attachments ---
        cartToggle.addEventListener('click', toggleCart);
        cartClose.addEventListener('click', toggleCart);
        cartOverlay.addEventListener('click', toggleCart);
        mobileMenuBtn.addEventListener('click', toggleMobileMenu);

        // Run application on configuration load complete
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCart();
        });
    </script>
</body>
</html>
