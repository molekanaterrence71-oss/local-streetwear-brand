<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XENON // Streetwear Store</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Root Variables & Reset --- */
        :root {
            --bg-black: #0a0a0a;
            --card-black: #121212;
            --text-white: #ffffff;
            --silver: #b3b3b3;
            --chrome-silver: #e5e5e5;
            --border-color: #262626;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: var(--font-main); background-color: var(--bg-black); color: var(--text-white); overflow-x: hidden; }

        /* --- Navigation --- */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; background-color: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem; }
        .nav-logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; color: var(--text-white); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 2.5rem; }
        .nav-link { color: var(--silver); text-decoration: none; font-size: 0.9rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s ease; }
        .nav-link:hover { color: var(--text-white); }
        .cart-btn { background: none; border: none; color: var(--text-white); font-size: 1.3rem; cursor: pointer; position: relative; }
        #cart-count { position: absolute; top: -8px; right: -10px; background-color: var(--text-white); color: var(--bg-black); font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 50%; }

        /* --- Hero Section --- */
        .hero-container { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        .hero-screen { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 1.5rem; transition: opacity 0.5s ease-in-out; }
        .hero-screen.hidden { opacity: 0; pointer-events: none; }
        .hero-front { background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1509281373149-e957c6296406?q=80&w=1920') no-repeat center center/cover; }
        .hero-back { background: linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.95)), url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1920') no-repeat center center/cover; }
        
        .hero-content h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; margin-bottom: 1rem; }
        .hero-content p { font-size: 1.2rem; color: var(--silver); letter-spacing: 4px; margin-bottom: 2.5rem; text-transform: uppercase; }
        .btn-primary, .btn-secondary { padding: 1rem 2rem; border: 1px solid var(--text-white); color: var(--text-white); text-decoration: none; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; background: transparent; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background-color: var(--text-white); color: var(--bg-black); }

        /* --- Product Grid --- */
        .products-section { max-width: 1300px; margin: 6rem auto; padding: 0 2rem; }
        .section-title { font-size: 2rem; letter-spacing: 4px; margin-bottom: 3rem; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
        .product-card { background-color: var(--card-black); border: 1px solid var(--border-color); overflow: hidden; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        .product-info { padding: 1.5rem; }
        .btn-add-cart { width: 100%; padding: 0.8rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-white); cursor: pointer; margin-top: 1rem; transition: 0.3s; }
        .btn-add-cart:hover { background: var(--text-white); color: var(--bg-black); }

        /* --- Cart Drawer --- */
        .cart-drawer { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background-color: var(--bg-black); border-left: 1px solid var(--border-color); z-index: 1002; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 2rem; overflow-y: auto; }
        .cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 1001; display: none; }
        .cart-overlay.active { display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">XENON</a>
            <ul class="nav-menu">
                <li><a href="#hero" class="nav-link">Home</a></li>
                <li><a href="#products" class="nav-link">Shop</a></li>
            </ul>
            <button id="cart-toggle" class="cart-btn"><i class="fa-solid fa-bag-shopping"></i><span id="cart-count">0</span></button>
        </div>
    </nav>

    <div id="hero" class="hero-container">
        <div id="screen-front" class="hero-screen hero-front active">
            <div class="hero-content">
                <h1>RAW. ELEVATED. INDUSTRIAL.</h1>
                <p>Drop 04 // Out Now</p>
                <div class="hero-btn-group" style="display: flex; gap: 1rem; justify-content: center;">
                    <a href="#products" class="btn-primary">Shop Drops</a>
                    <button class="btn-secondary" id="showStory">Our Story</button>
                </div>
            </div>
        </div>

        <div id="screen-back" class="hero-screen hero-back hidden">
            <div class="hero-content" style="max-width: 700px;">
                <h2>THE ARCHITECTURE OF XENON</h2>
                <p style="margin-bottom: 2rem; color: var(--chrome-silver);">We don't build collections for trends; we build hardware for the body to survive the modern landscape.</p>
                <button class="btn-primary" id="showHome">Back to Shop</button>
            </div>
        </div>
    </div>

    <main id="products" class="products-section">
        <h2 class="section-title">FEATURED DROPS</h2>
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <h3>YOUR BAG</h3>
        <div id="cart-items" style="margin-top: 2rem;"></div>
    </div>
    <div id="cart-overlay" class="cart-overlay"></div>

    <script>
        const products = [
            { id: 1, name: "RAW SEAM HOODIE", price: 85.00, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600" },
            { id: 2, name: "BOX FIT OVERSIZED T-SHIRT", price: 45.00, image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600" },
            { id: 3, name: "HEAVYWEIGHT SWEATER", price: 75.00, image: "https://images.unsplash.com/photo-1598371839684-b28e3305363e?q=80&w=600" },
            { id: 4, name: "TECHNICAL TRACKPANTS", price: 95.00, image: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?q=80&w=600" },
            { id: 5, name: "INDUSTRIAL JACKET", price: 160.00, image: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=600" },
            { id: 6, name: "LONG SLEEVE THERMAL", price: 55.00, image: "https://images.unsplash.com/photo-1602810318394-43b6058e4585?q=80&w=600" },
            { id: 7, name: "XENON LOGO BEANIE", price: 30.00, image: "https://images.unsplash.com/photo-1576871337632-b9a64c41005f?q=80&w=600" },
            { id: 8, name: "SIGNATURE CAP", price: 35.00, image: "https://images.unsplash.com/photo-1588850561407-ed78c672e8bb?q=80&w=600" },
            { id: 9, name: "CREW SOCKS (2-PACK)", price: 20.00, image: "https://images.unsplash.com/photo-1590486803833-9c3dbb64a357?q=80&w=600" }
        ];

        let cart = [];
        const productGrid = document.getElementById('product-grid');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');

        // Render Products
        productGrid.innerHTML = products.map(product => `
            <div class="product-card">
                <img src="${product.image}" alt="${product.name}">
                <div class="product-info">
                    <h3>${product.name}</h3>
                    <p>$${product.price.toFixed(2)}</p>
                    <button class="btn-add-cart" onclick="addToCart(${product.id})">ADD TO BAG</button>
                </div>
            </div>
        `).join('');

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            cartCount.innerText = cart.length;
            updateCartUI();
        }

        function updateCartUI() {
            cartItemsContainer.innerHTML = cart.map(item => `
                <div style="margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; display: flex; justify-content: space-between;">
                    <span>${item.name}</span>
                    <span>$${item.price.toFixed(2)}</span>
                </div>
            `).join('');
        }

        // Interaction Logic
        document.getElementById('showStory').addEventListener('click', () => {
            document.getElementById('screen-front').classList.replace('active', 'hidden');
            document.getElementById('screen-back').classList.replace('hidden', 'active');
        });

        document.getElementById('showHome').addEventListener('click', () => {
            document.getElementById('screen-back').classList.replace('active', 'hidden');
            document.getElementById('screen-front').classList.replace('hidden', 'active');
        });

        document.getElementById('cart-toggle').addEventListener('click', () => {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
        });

        document.getElementById('cart-overlay').addEventListener('click', () => {
            document.getElementById('cart-drawer').classList.remove('active');
            document.getElementById('cart-overlay').classList.remove('active');
        });
    </script>
</body>
</html>
