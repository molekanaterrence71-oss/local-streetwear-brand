<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XENON // Streetwear Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #0a0a0a; --card-black: #121212; --text-white: #ffffff;
            --silver: #b3b3b3; --border-color: #262626; --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: var(--font-main); background-color: var(--bg-black); color: var(--text-white); overflow-x: hidden; }

        /* --- Nav & Layout --- */
        .navbar { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; padding: 1.5rem 2rem; }
        .nav-logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; color: var(--text-white); text-decoration: none; }
        .nav-menu { display: flex; list-style: none; gap: 2.5rem; }
        .nav-link { color: var(--silver); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; }
        
        /* --- Hero Transition System --- */
        .hero-container { width: 100%; height: 100vh; position: relative; overflow: hidden; }
        .hero-screen { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 0 1.5rem; transition: opacity 0.5s ease-in-out; }
        .hero-screen.hidden { opacity: 0; pointer-events: none; z-index: 0; }
        .hero-screen.active { opacity: 1; z-index: 1; }
        .hero-front { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1509281373149-e957c6296406?q=80&w=1920') no-repeat center center/cover; }
        .hero-back { background: linear-gradient(rgba(10,10,10,0.9), rgba(10,10,10,0.95)), url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1920') no-repeat center center/cover; }
        
        /* --- Hex Grid --- */
        .hex-container { position: absolute; top: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: grid; grid-template-columns: repeat(24, 1fr); grid-template-rows: repeat(12, 1fr); }
        .hex-cell { opacity: 0; transform: scale(0.0) rotate(-60deg); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: transform 0.6s ease, opacity 0.6s ease; background-color: #000000; }
        .hex-container.animate .hex-cell { opacity: 1; transform: scale(1.25) rotate(0deg); }

        /* --- Products & Cart --- */
        .products-section { max-width: 1300px; margin: 6rem auto; padding: 0 2rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
        .product-card { background: var(--card-black); border: 1px solid var(--border-color); padding: 1.5rem; }
        .btn-add-cart { width: 100%; padding: 0.8rem; background: transparent; border: 1px solid var(--border-color); color: white; cursor: pointer; margin-top: 1rem; }
        .cart-drawer { position: fixed; top: 0; right: -400px; width: 400px; height: 100%; background: var(--bg-black); border-left: 1px solid var(--border-color); z-index: 1002; transition: 0.4s; }
        .cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1001; display: none; }
        .cart-overlay.active { display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">XENON</a>
            <ul class="nav-menu">
                <li><a href="#hero" class="nav-link">Home</a></li>
                <li><a href="#products" class="nav-link">Shop</a></li>
            </ul>
            <button id="cart-toggle" style="background:none; border:none; color:white; cursor:pointer;">
                <i class="fa-solid fa-bag-shopping"></i> <span id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <div id="hero" class="hero-container">
        <div class="hex-container" id="hexContainer"></div>
        <div id="screen-front" class="hero-screen hero-front active">
            <div class="hero-content">
                <h1>RAW. ELEVATED. INDUSTRIAL.</h1>
                <button class="btn-primary" id="showStory">Our Story</button>
            </div>
        </div>
        <div id="screen-back" class="hero-screen hero-back hidden">
            <div class="hero-content">
                <h2>THE ARCHITECTURE OF XENON</h2>
                <p>We build hardware for the body to survive the modern landscape.</p>
                <button class="btn-primary" id="showHome">Back to Shop</button>
            </div>
        </div>
    </div>

    <main id="products" class="products-section">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div id="cart-drawer" class="cart-drawer">
        <div style="padding:2rem;"><h3>YOUR BAG</h3><button id="cart-close">Close</button></div>
        <div id="cart-items" style="padding:2rem;"></div>
        <div id="cart-total" style="padding:2rem;">Total: $0.00</div>
    </div>
    <div id="cart-overlay" class="cart-overlay"></div>

    <script>
        const products = [
            { id: 1, name: "OVERSIZED SEAM HOODIE", price: 85.00, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600" },
            { id: 2, name: "BOX FIT T-SHIRT", price: 45.00, image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?q=80&w=600" }
        ];

        let cart = JSON.parse(localStorage.getItem('xenon_cart')) || [];
        
        // Setup Grid
        const hexContainer = document.getElementById('hexContainer');
        for (let i = 0; i < 288; i++) {
            const cell = document.createElement('div');
            cell.classList.add('hex-cell');
            cell.style.transitionDelay = `${(i % 24 + Math.floor(i/24)) * 0.03}s`;
            hexContainer.appendChild(cell);
        }

        function switchHeroSection(toStory) {
            hexContainer.classList.add('animate');
            setTimeout(() => {
                document.getElementById('screen-front').classList.toggle('active', !toStory);
                document.getElementById('screen-front').classList.toggle('hidden', toStory);
                document.getElementById('screen-back').classList.toggle('active', toStory);
                document.getElementById('screen-back').classList.toggle('hidden', !toStory);
            }, 1000);
            setTimeout(() => hexContainer.classList.remove('animate'), 2000);
        }

        // Cart Logic
        function updateCart() {
            localStorage.setItem('xenon_cart', JSON.stringify(cart));
            document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.quantity, 0);
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map(item => `<div>${item.name} - $${item.price} (Qty: ${item.quantity})</div>`).join('');
            document.getElementById('cart-total').textContent = `Total: $${cart.reduce((s, i) => s + (i.price * i.quantity), 0).toFixed(2)}`;
        }

        // Event Delegation
        document.getElementById('product-grid').innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.image}" style="width:100%; height:auto;">
                <h3>${p.name}</h3>
                <button class="btn-add-cart" onclick="addToCart(${p.id})">ADD TO BAG</button>
            </div>
        `).join('');

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            const exists = cart.find(i => i.id === id);
            if (exists) exists.quantity++;
            else cart.push({...p, quantity: 1});
            updateCart();
        }

        document.getElementById('showStory').addEventListener('click', () => switchHeroSection(true));
        document.getElementById('showHome').addEventListener('click', () => switchHeroSection(false));
        document.getElementById('cart-toggle').addEventListener('click', () => {
            document.getElementById('cart-drawer').classList.add('active');
            document.getElementById('cart-overlay').classList.add('active');
        });
        document.getElementById('cart-close').addEventListener('click', () => {
            document.getElementById('cart-drawer').classList.remove('active');
            document.getElementById('cart-overlay').classList.remove('active');
        });

        updateCart();
    </script>
</body>
</html>
